/* statusbar-configs/compact.conf - Compact Statusbar
 *
 * Space-optimized single-line bar with essential widgets:
 * - Clock (left)
 * - CPU, Memory (right)
 *
 * Designed for narrow spaces, minimalist aesthetic
 */

/* Configuration for Compact Bar */
{
    "name": "Compact Statusbar", 
    "height": 24,
    "position": "top",
    "exclusive_zone": 24,
    
    "widgets": [
        "clock",
        "cpu",
        "memory",
        "network"
    ],
    
    "widget_config": {
        "clock": {
            "format": "12h",
            "show_seconds": false,
            "position": "left"
        },
        "cpu": {
            "show_icon": true,
            "show_temp": false,
            "position": "right"
        },
        "memory": {
            "show_swap": false,
            "position": "right"
        },
        "network": {
            "show_icon": true,
            "show_signal": true,
            "position": "right"
        }
    },
    
    "theme": "catppuccin-mocha"
}
