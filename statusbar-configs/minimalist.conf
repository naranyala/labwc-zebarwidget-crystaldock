/* statusbar-configs/minimalist.conf - Minimalist Statusbar
 *
 * Clean, simple bar with only essential information:
 * - Clock (centered, subtle)
 *
 * Designed for aesthetic minimalism, no distractions
 */

/* Configuration for Minimalist Bar */
{
    "name": "Minimalist Statusbar",
    "height": 20,
    "position": "top",
    "exclusive_zone": 20,
    
    "widgets": [
        "clock"
    ],
    
    "widget_config": {
        "clock": {
            "format": "24h",
            "show_seconds": false,
            "show_date": false,
            "position": "center",
            "transparent": true,
            "show_border": false
        }
    },
    
    "theme": "tokyo-night",
    
    "style": {
        "background_alpha": 0.0,
        "show_border": false,
        "show_shadow": false
    }
}
