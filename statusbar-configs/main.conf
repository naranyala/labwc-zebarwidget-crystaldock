/* statusbar-configs/main.conf - Main Statusbar
 *
 * Full-featured comprehensive statusbar with all available widgets:
 * - Workspaces (left)
 * - Clock (center)
 * - System modules (right): CPU, Memory, Network, Battery, Volume
 *
 * This is the default, most feature-complete statusbar
 */

/* Configuration for Main Bar */
{
    "name": "Main Statusbar",
    "height": 32,
    "position": "top",
    "exclusive_zone": 32,
    
    "widgets": [
        "workspaces",
        "clock", 
        "cpu",
        "memory",
        "network",
        "battery",
        "volume"
    ],
    
    "widget_config": {
        "workspaces": {
            "count": 9,
            "position": "left",
            "show_active": true
        },
        "clock": {
            "format": "24h",
            "show_seconds": false,
            "position": "center"
        },
        "system": {
            "refresh_interval": 1000,
            "show_details": true
        }
    },
    
    "theme": "catppuccin-mocha"
}
