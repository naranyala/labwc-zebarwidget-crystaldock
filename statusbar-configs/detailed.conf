/* statusbar-configs/detailed.conf - Detailed Statusbar
 *
 * Grid dashboard with comprehensive metrics and visual details:
 * - Workspaces (top row, 3 cols)
 * - Clock (top row, center col)
 * - System metrics (bottom 2 rows, 3x2 grid)
 *
 * Designed for desktop monitors, maximum information display
 */

/* Configuration for Detailed Bar */
{
    "name": "Detailed Statusbar",
    "height": 40,
    "position": "top", 
    "exclusive_zone": 40,
    
    "layout": {
        "type": "grid",
        "cols": 3,
        "rows": 2,
        "gap": 10,
        "widget_positions": [
            "workspaces", "clock", "cpu",
            "memory", "network", "battery",
            "volume", "empty", "empty"
        ]
    },
    
    "widgets": [
        "workspaces",
        "clock",
        "cpu", 
        "memory",
        "network",
        "battery",
        "volume"
    ],
    
    "widget_config": {
        "workspaces": {
            "count": 9,
            "position": "top-left",
            "show_all": true
        },
        "clock": {
            "format": "24h",
            "show_seconds": true,
            "show_date": true,
            "position": "top-center"
        },
        "cpu": {
            "show_icon": true,
            "show_temp": true,
            "show_cores": true,
            "position": "bottom-left"
        },
        "memory": {
            "show_swap": true,
            "show_details": true,
            "position": "bottom-center"
        },
        "network": {
            "show_icon": true,
            "show_signal": true,
            "show_type": true,
            "position": "bottom-right"
        },
        "battery": {
            "show_percent": true,
            "show_time": true,
            "show_charging": true,
            "position": "extra-left"
        },
        "volume": {
            "show_level": true,
            "show_muted": true,
            "show_sink": true,
            "position": "extra-right"
        }
    },
    
    "theme": "nord"
}
