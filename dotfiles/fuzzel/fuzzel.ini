# Fuzzel app launcher
# Catppuccin Mocha theme

[main]
dpi-aware=no
match-mode=exact
sort-result=yes
render-workers=4
match-workers=4

# Appearance
font=Noto Sans 12
icons-enabled=yes
icon-theme=elementary
prompt=❯
placeholder=Type to search...
anchor=center
width=40
lines=15
horizontal-pad=40
vertical-pad=8
layer=overlay

[colors]
background=#1e1e2eff
text=#cdd6f4ff
prompt=#89b4faff
placeholder=#a6adc8ff
input=#cdd6f4ff
match=#89b4faff
selection=#45475a22
selection-text=#cdd6f4ff
selection-match=#89b4faff
border=#45475a33
error=#f38ba8ff

[border]
width=2
radius=12
