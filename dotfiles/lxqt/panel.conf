# ~/.config/lxqt/panel.conf
#
# This is the default panel config, identical to modes/tworow.conf.
# For other modes, use: lxqt-panel-switcher <mode>
# or: toggle-shell <mode>
#
# See modes/ directory for all available panel configurations.

# --- Default: tworow mode (top panel + zigshell-cairo-pango 2-row taskbar) ---
# This file is deployed as-is by install.sh.
# Runtime switching copies the desired mode from modes/ to this path.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=left
position=top
size=36
screen=all
theme=graphite
plugins=mainmenu;showdesktop;taskbar;separator;tray;volume;worldclock

[plugin-mainmenu]
type=mainmenu
showIconButton=true

[plugin-showdesktop]
type=showdesktop

[plugin-taskbar]
type=taskbar
showDesktopButton=false
showIcon=false
showTitle=true
closeOnMiddleClick=true
raiseOnClick=true
autoRotate=true

[plugin-separator]
type=separator

[plugin-tray]
type=tray

[plugin-volume]
type=volume

[plugin-worldclock]
type=worldclock
