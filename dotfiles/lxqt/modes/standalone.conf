# ~/.config/lxqt/panel.conf — standalone mode
#
# All-in-one top panel: lxqt-panel handles everything.
# No zigshell-cairo-pango companion needed.
# Force the wlroots backend so the taskbar/showdesktop plugins work on labwc.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=left
position=top
size=36
screen=all
theme=graphite
plugins=mainmenu;desktopswitch;taskbar;quicklaunch;separator;showdesktop;tray;volume;worldclock

[plugin-mainmenu]
type=mainmenu
showIconButton=true

[plugin-desktopswitch]
type=desktopswitch

[plugin-taskbar]
type=taskbar
showDesktopButton=false
showIcon=true
showTitle=true
closeOnMiddleClick=true
raiseOnClick=true
autoRotate=true

[plugin-quicklaunch]
type=quicklaunch

[plugin-separator]
type=separator

[plugin-showdesktop]
type=showdesktop

[plugin-tray]
type=tray

[plugin-volume]
type=volume

[plugin-worldclock]
type=worldclock
