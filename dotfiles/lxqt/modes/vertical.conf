# ~/.config/lxqt/panel.conf — vertical mode
#
# Right-side vertical panel for dock/taskbar.
# Paired with an zigshell-cairo-pango statusbar at the top.
# Force the wlroots backend so the taskbar/showdesktop plugins work on labwc.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=top
position=right
size=48
screen=all
theme=graphite
plugins=mainmenu;quicklaunch;taskbar;separator;showdesktop;tray;volume

[plugin-mainmenu]
type=mainmenu
showIconButton=true

[plugin-quicklaunch]
type=quicklaunch

[plugin-taskbar]
type=taskbar
showDesktopButton=false
showIcon=true
showTitle=false
closeOnMiddleClick=true
raiseOnClick=true
autoRotate=true

[plugin-separator]
type=separator

[plugin-showdesktop]
type=showdesktop

[plugin-tray]
type=tray

[plugin-volume]
type=volume
