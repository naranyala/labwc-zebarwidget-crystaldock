# ~/.config/lxqt/panel.conf — dual-lxqt mode
#
# Two native lxqt-panels: top status bar + bottom taskbar.
# No zigshell-cairo-pango companion needed.
# Force the wlroots backend so the taskbar/showdesktop plugins work on labwc.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=left
position=top
size=32
screen=all
theme=graphite
plugins=mainmenu;desktopswitch;separator;tray;volume;worldclock

[plugin-mainmenu]
type=mainmenu
showIconButton=true

[plugin-desktopswitch]
type=desktopswitch

[plugin-separator]
type=separator

[plugin-tray]
type=tray

[plugin-volume]
type=volume

[plugin-worldclock]
type=worldclock

[panel2]
alignment=left
position=bottom
size=40
screen=all
theme=graphite
plugins=quicklaunch;taskbar;showdesktop

[plugin-quicklaunch]
type=quicklaunch

[plugin-taskbar]
type=taskbar
showDesktopButton=false
showIcon=true
showTitle=true
closeOnMiddleClick=true
raiseOnClick=true
autoRotate=true

[plugin-showdesktop]
type=showdesktop
