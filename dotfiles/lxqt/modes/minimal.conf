# ~/.config/lxqt/panel.conf — minimal mode
#
# Ultra-clean top panel: tray + clock only.
# Paired with an zigshell-cairo-pango minimal bar that handles launcher/workspaces.
# Force the wlroots backend for labwc compatibility.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=right
position=top
size=28
screen=all
theme=graphite
plugins=separator;tray;volume;worldclock

[plugin-separator]
type=separator

[plugin-tray]
type=tray

[plugin-volume]
type=volume

[plugin-worldclock]
type=worldclock
