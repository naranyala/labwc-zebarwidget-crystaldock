# ~/.config/lxqt/panel.conf — classic mode
#
# Bottom panel (macOS/Windows-style taskbar at bottom).
# Paired with an zigshell-cairo-pango statusbar at the top.
# Force the wlroots backend so the taskbar/showdesktop plugins work on labwc.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=left
position=bottom
size=40
screen=all
theme=graphite
plugins=mainmenu;quicklaunch;taskbar;separator;showdesktop;tray;volume;worldclock

[plugin-mainmenu]
type=mainmenu
showIconButton=true

[plugin-quicklaunch]
type=quicklaunch

[plugin-taskbar]
type=taskbar
showDesktopButton=false
showIcon=true
showTitle=true
closeOnMiddleClick=true
raiseOnClick=true
autoRotate=true

[plugin-separator]
type=separator

[plugin-showdesktop]
type=showdesktop

[plugin-tray]
type=tray

[plugin-volume]
type=volume

[plugin-worldclock]
type=worldclock
