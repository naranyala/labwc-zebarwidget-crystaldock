# ~/.config/lxqt/panel.conf — tworow mode
#
# Top panel paired with the OCWS/zigshell-cairo-pango 2-row taskbar docked at the bottom.
# Force the wlroots backend so the taskbar/showdesktop plugins work on labwc.

[General]
preferred_backend=labwc:wlroots

[panel1]
alignment=left
position=top
size=36
screen=all
theme=graphite
plugins=mainmenu;showdesktop;taskbar;separator;tray;volume;worldclock

[plugin-mainmenu]
type=mainmenu
showIconButton=true

[plugin-showdesktop]
type=showdesktop

[plugin-taskbar]
type=taskbar
showDesktopButton=false
showIcon=false
showTitle=true
closeOnMiddleClick=true
raiseOnClick=true
autoRotate=true

[plugin-separator]
type=separator

[plugin-tray]
type=tray

[plugin-volume]
type=volume

[plugin-worldclock]
type=worldclock
