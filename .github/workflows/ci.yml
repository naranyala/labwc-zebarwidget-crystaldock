name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libcairo2-dev \
            libtesseract-dev \
            libleptonica-dev \
            libglib2.0-dev \
            libgio2.0-cil-dev \
            libgobject2.0-cil-dev

      - name: Run unit tests
        run: zig build test

      - name: Run bash test suite
        run: bash tests/run-bash-tests.sh

      - name: Build C binaries
        run: zig build

      - name: Run C binary test suite
        run: bash tests/test-c-binaries.sh

      - name: Run headless libocws C unit tests
        run: zig build test-libocws

      - name: Run shared log level parser tests
        run: zig build test-log

  build-zig-shells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Wayland/Cairo/Pango dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libwayland-client++-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libglib2.0-dev

      # Regression guard: the Zig panel/dock sources were never built by CI
      # before, so Zig-version incompatibilities (dirent, @divTrunc, fs API)
      # stayed hidden until a local rebuild. Always compile + test the shell.
      - name: Build zigshell-cairo-pango (panel + dock)
        run: cd src/shells/zigshell-cairo-pango && zig build

      - name: Test zigshell-cairo-pango
        run: cd src/shells/zigshell-cairo-pango && zig build test

      # NOTE: zigshell-blend2d is intentionally NOT built here. Its build
      # requires the Blend2D C++ submodule + CMake (gitignored under
      # build/deps), which is not available in CI. It is verified locally.

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
                   --suppress=missingIncludeSystem \
                   --suppressions-list=.cppcheck-suppressions \
                   --error-exitcode=1 \
                   --inline-suppr \
                   -I src/core -I src/gui -I src/cli -I src/daemons -I src/libocws \
                   src/

  build:
    needs: [test, static-analysis]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - riscv64-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libcairo2-dev \
            libtesseract-dev \
            libleptonica-dev \
            libglib2.0-dev \
            libgio2.0-cil-dev \
            libgobject2.0-cil-dev

      - name: Build
        run: |
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Run C binary test suite
        if: matrix.target == 'x86_64-linux-musl'
        run: bash tests/test-c-binaries.sh

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/ocws* dist/
          tar -czf ocws-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocws-${{ matrix.target }}
          path: ocws-${{ matrix.target }}.tar.gz

  build-asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libcairo2-dev \
            libtesseract-dev \
            libleptonica-dev \
            libglib2.0-dev \
            libgio2.0-cil-dev \
            libgobject2.0-cil-dev

      - name: Build with AddressSanitizer
        run: |
          zig build -Dasan=true -Dtarget=x86_64-linux-gnu

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION 2>/dev/null || echo '0.0.0')" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OCWS v${{ steps.version.outputs.version }}
          body: |
            ## OCWS v${{ steps.version.outputs.version }}

            Pre-built binaries for multiple architectures:
            - x86_64 Linux (musl)
            - aarch64 Linux (musl)
            - riscv64 Linux (musl)

            ### Installation
            ```bash
            # Download and extract
            tar -xzf ocws-x86_64-linux-musl.tar.gz
            sudo cp ocws* /usr/local/bin/
            ```
          files: |
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
